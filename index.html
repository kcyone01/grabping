<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Ping Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            margin-top: 0;
            color: #00b14f; /* Grab Green */
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .metric {
            margin: 15px 0;
            font-size: 16px;
            color: #444;
        }
        .value {
            font-weight: 600;
            color: #111;
            float: right;
        }
        .input-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #00b14f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background-color: #008f3e;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Client-Side Ping Test</h2>
        <div class="metric">Your Public IP: <span id="ip" class="value">Loading...</span></div>
        <div class="metric">Your ISP: <span id="isp" class="value">Loading...</span></div>
        <div class="metric">Live Ping to Target: <span id="ping" class="value">Waiting...</span></div>

        <div class="input-group">
            <input type="text" id="targetUrl" value="https://help.grab.com/driver/en-my" placeholder="e.g., https://example.com">
            <button onclick="measurePing()">Test Ping</button>
        </div>
        
        <div class="note">
            <strong>How it works:</strong> This triggers a real network request directly from your browser to Grab's servers, tracking the exact round-trip latency in milliseconds.
        </div>
    </div>

    <script>
        // 1. Fetch IP and ISP directly from the client side
        fetch('https://freeipapi.com/api/json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('ip').innerText = data.ipAddress || "N/A";
                document.getElementById('isp').innerText = data.isp || "N/A";
            })
            .catch(() => {
                fetch('https://ipapi.co/json/')
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('ip').innerText = data.ip;
                        document.getElementById('isp').innerText = data.org;
                    })
                    .catch(() => {
                        document.getElementById('ip').innerText = "Unavailable";
                        document.getElementById('isp').innerText = "Unavailable";
                    });
            });

        // 2. Measure Client-Side Network Ping
        function measurePing() {
            const target = document.getElementById('targetUrl').value.trim();
            if (!target) return;

            document.getElementById('ping').innerText = "Testing...";
            const start = performance.now();
            const cacheBuster = target + (target.includes('?') ? '&' : '?') + 'tbust=' + Date.now();

            fetch(cacheBuster, { 
                mode: 'no-cors', 
                cache: 'no-store',
                credentials: 'omit'
            })
            .then(() => {
                const duration = performance.now() - start;
                document.getElementById('ping').innerText = Math.round(duration) + ' ms';
            })
            .catch(() => {
                const duration = performance.now() - start;
                document.getElementById('ping').innerText = Math.round(duration) + ' ms';
            });
        }

        window.onload = () => {
            setTimeout(measurePing, 500);
        };
    </script>

</body>
</html>
