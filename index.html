<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
        }
        h3 { margin-top: 0; color: #0076d6; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        p { font-size: 16px; margin: 15px 0; display: flex; justify-content: space-between; }
        span { font-weight: bold; color: #444; }
        .error { color: #d93025; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Network Dashboard</h3>
        <p>Public IP: <span id="ip">Loading...</span></p>
        <p>ISP: <span id="isp">Loading...</span></p>
        <p>Ping (Server-side): <span id="ping">Testing...</span></p>
    </div>

    <script>
        // Request the aggregated network data from your Netlify serverless function
        fetch('/.netlify/functions/ping')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Function returned 404 or server failure');
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.isp;
                document.getElementById('ping').innerText = data.time;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('ip').innerText = "Error";
                document.getElementById('ip').className = "error";
                document.getElementById('isp').innerText = "Error";
                document.getElementById('isp').className = "error";
                document.getElementById('ping').innerText = "Setup Error (404)";
                document.getElementById('ping').className = "error";
            });
    </script>

</body>
</html>
