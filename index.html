<!DOCTYPE html>
<html lang="en">
<body>
    <h3>Network Dashboard</h3>
    <p>Public IP: <span id="ip">Loading...</span></p>
    <p>ISP: <span id="isp">Loading...</span></p>
    <p>Ping (Server-side): <span id="ping">Testing...</span></p>

    <script>
        // 1. Fetch IP and ISP (Note: This may be blocked by CORS if not proxied)
        fetch('https://ipapi.co/json/')
            .then(r => r.json())
            .then(data => {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.org;
            })
            .catch(() => document.getElementById('ip').innerText = "Blocked by CORS");

        // 2. Fetch Ping from your Netlify Function
        fetch('/.netlify/functions/ping')
            .then(r => r.json())
            .then(data => {
                document.getElementById('ping').innerText = data.time;
            })
            .catch(() => {
                document.getElementById('ping').innerText = "Error loading ping";
            });
    </script>
</body>
</html>
