<script>
    // 1. Password Lock Gate
    // Change 'SuperSecret123' to whatever password you want
    const ACCESS_PASSWORD = "abc123"; 
    
    const userAttempt = prompt("Enter password to access the network dashboard:");
    if (userAttempt !== ACCESS_PASSWORD) {
        document.body.innerHTML = `
            <div style="font-family:sans-serif; text-align:center; margin-top:100px;">
                <h2 style="color:#d93025;">Access Denied</h2>
                <p>You do not have permission to use this utility.</p>
            </div>
        `;
        throw new Error("Access denied: Incorrect password.");
    }

    // 2. Fetch IP and ISP (Only runs if password is correct)
    fetch('https://freeipapi.com/api/json')
        .then(r => r.json())
        .then(data => {
            document.getElementById('ip').innerText = data.ipAddress || "N/A";
            document.getElementById('isp').innerText = data.isp || "N/A";
        })
        .catch(() => {
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('ip').innerText = data.ip;
                    document.getElementById('isp').innerText = data.org;
                });
        });

    // 3. Measure Client-Side Network Ping
    function measurePing() {
        const target = document.getElementById('targetUrl').value.trim();
        if (!target) return;

        document.getElementById('ping').innerText = "Testing...";
        const start = performance.now();
        const cacheBuster = target + (target.includes('?') ? '&' : '?') + 'tbust=' + Date.now();

        fetch(cacheBuster, { mode: 'no-cors', cache: 'no-store', credentials: 'omit' })
        .then(() => {
            const duration = performance.now() - start;
            document.getElementById('ping').innerText = Math.round(duration) + ' ms';
        })
        .catch(() => {
            const duration = performance.now() - start;
            document.getElementById('ping').innerText = Math.round(duration) + ' ms';
        });
    }

    window.onload = () => {
        setTimeout(measurePing, 500);
    };
</script>
