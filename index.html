<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 40px; }
        h3 { margin-top: 0; color: #0076d6; }
        p { font-size: 16px; margin: 10px 0; }
        span { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Network Dashboard</h3>
        <p>Public IP: <span id="ip">Loading...</span></p>
        <p>ISP: <span id="isp">Loading...</span></p>
        <p>Ping (Server-side): <span id="ping">Testing...</span></p>
    </div>

    <script>
        // Fetch all data safely from your proxy Netlify Function
        fetch('/.netlify/functions/ping')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Server responded with status ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('ip').innerText = data.ip || "Unavailable";
                document.getElementById('isp').innerText = data.isp || "Unavailable";
                document.getElementById('ping').innerText = data.time || "Error";
            })
            .catch(err => {
                console.error("Dashboard Error:", err);
                document.getElementById('ip').innerText = "Failed to load";
                document.getElementById('isp').innerText = "Failed to load";
                document.getElementById('ping').innerText = "Function 404 / Unreachable";
            });
    </script>
</body>
</html>
